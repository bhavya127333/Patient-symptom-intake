<!DOCTYPE html>
<html>
<head>
    <title>Patient Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="dashboard-page">

    <div class="dashboard-header">
        <div>
            <h1>Welcome {{ username }}</h1>
            <p>Complete your symptom intake before doctor consultation</p>
        </div>

        <a href="/logout">
            <button class="logout-btn">Logout</button>
        </a>
    </div>

    <div class="dashboard-grid">

        <div class="info-card">
            <h2>🏥 Patient Intake</h2>
            <p>
                Fill your symptoms, medical history, medicines,
                and allergies. AI will generate a doctor-ready report.
            </p>

            <div class="steps">
                <span>1. Enter Details</span>
                <span>2. Generate Summary</span>
                <span>3. Doctor Review</span>
            </div>
        </div>

        <div class="form-card">
            <h2>🩺 Symptom Form</h2>

            <form action="/submit" method="POST">

                <input type="text" name="name" placeholder="👤 Patient Name" required>

                <input type="number" name="age" placeholder="🎂 Age" required>

                <select name="gender" required>
                    <option value="">⚧ Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

                <input type="text" name="duration" placeholder="⏳ Duration of Symptoms" required>

                <textarea name="symptoms" placeholder="🩺 Describe Symptoms" required></textarea>

                <textarea name="history" placeholder="📋 Medical History"></textarea>

                <textarea name="medicines" placeholder="💊 Current Medicines"></textarea>

                <textarea name="allergies" placeholder="⚠ Allergies"></textarea>

                <button type="submit">Generate AI Medical Report</button>

            </form>
        </div>

    </div>

</div>

</body>
</html>
